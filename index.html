<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Space Shooter</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #020208;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      touch-action: none; 
      user-select: none;
    }
    canvas {
      display: block;
    }
    
    /* Utility class to hide elements without breaking CSS media queries */
    .hidden {
      display: none !important;
    }

    /* UI Layouts */
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      z-index: 5;
    }
    #scoreDisplay {
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 15px #0ff;
      letter-spacing: 2px;
    }

    /* Menu & Game Over Shared Styles */
    .overlay-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 20;
      background: rgba(2, 2, 8, 0.85);
      padding: 40px;
      border: 2px solid #0ff;
      border-radius: 10px;
      box-shadow: 0 0 25px #0ff inset, 0 0 25px #0ff;
      backdrop-filter: blur(5px);
      width: 80%;
      max-width: 400px;
    }
    h1 {
      font-size: 42px;
      text-shadow: 0 0 25px #f0f;
      margin-top: 0;
      margin-bottom: 10px;
      letter-spacing: 4px;
      color: #fff;
    }
    
    /* Main Menu Specifics */
    #mainMenu p {
      color: #0ff;
      font-size: 16px;
      margin-bottom: 25px;
    }
    .controls-info {
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 25px;
      font-size: 14px;
      color: #ccc;
      border: 1px solid #333;
      text-align: left;
      line-height: 1.6;
    }
    .controls-info strong {
      color: #ff0;
    }

    /* Buttons */
    button.neon-btn {
      padding: 12px 30px;
      font-size: 18px;
      background: rgba(0, 255, 255, 0.1);
      color: #0ff;
      border: 2px solid #0ff;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: bold;
      box-shadow: 0 0 15px #0ff inset, 0 0 15px #0ff;
      transition: 0.3s;
      border-radius: 5px;
      width: 100%;
      margin-bottom: 15px;
    }
    button.neon-btn:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 25px #0ff inset, 0 0 25px #0ff;
    }
    button.btn-secondary {
      border-color: #f0f;
      color: #f0f;
      background: rgba(255, 0, 255, 0.1);
      box-shadow: 0 0 15px #f0f inset, 0 0 15px #f0f;
      margin-bottom: 0;
    }
    button.btn-secondary:hover {
      background: #f0f;
      color: #000;
      box-shadow: 0 0 25px #f0f inset, 0 0 25px #f0f;
    }

    /* Mobile Controls Styling */
    #mobileControls {
      position: absolute;
      bottom: 30px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none; 
      z-index: 10;
    }
    .control-group {
      display: flex;
      gap: 15px;
    }
    .touch-btn {
      pointer-events: auto; 
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.1);
      border: 2px solid #0ff;
      color: #0ff;
      font-size: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 15px #0ff inset;
      touch-action: manipulation; 
    }
    .touch-btn:active {
      background: rgba(0, 255, 255, 0.5);
      box-shadow: 0 0 25px #0ff inset;
    }
    #btnShoot {
      width: 75px;
      height: 75px;
      border-color: #ff0;
      color: #ff0;
      background: rgba(255, 255, 0, 0.1);
      box-shadow: 0 0 15px #ff0 inset;
      font-size: 18px;
      font-weight: bold;
    }
    #btnShoot:active {
      background: rgba(255, 255, 0, 0.5);
    }

    @media (min-width: 768px) {
      #mobileControls { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- Main Menu UI -->
  <div id="mainMenu" class="overlay-panel">
    <h1>NEON STRIKE</h1>
    <p>Defend the sector. Destroy all hostiles.</p>
    
    <div class="controls-info">
      <strong>DESKTOP:</strong> Arrow Keys to Move • Spacebar to Fire<br><br>
      <strong>MOBILE:</strong> Use On-Screen Touch Controls
    </div>

    <button class="neon-btn" onclick="startGame()">Start Mission</button>
  </div>

  <!-- In-Game UI -->
  <div id="ui" class="hidden">
    <div id="scoreDisplay">SCORE: 0</div>
  </div>

  <!-- Game Over UI -->
  <div id="gameOver" class="overlay-panel hidden">
    <h1 style="font-size: 36px;">SYSTEM FAILURE</h1>
    <button class="neon-btn" onclick="startGame()">Retry Mission</button>
    <button class="neon-btn btn-secondary" onclick="showMenu()">Main Menu</button>
  </div>

  <!-- Mobile Controls -->
  <div id="mobileControls" class="hidden">
    <div class="control-group">
      <div id="btnLeft" class="touch-btn">◀</div>
      <div id="btnRight" class="touch-btn">▶</div>
    </div>
    <div id="btnShoot" class="touch-btn">FIRE</div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Game States: 'menu', 'playing', 'gameover'
    let gameState = 'menu'; 
    let score = 0;
    const keys = {};

    // UI Elements
    const elMainMenu = document.getElementById('mainMenu');
    const elGameOver = document.getElementById('gameOver');
    const elUI = document.getElementById('ui');
    const elMobileControls = document.getElementById('mobileControls');

    // Generate Parallax Stars
    const stars = [];
    for (let i = 0; i < 150; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.5,
        speed: Math.random() * 3 + 0.5,
        color: `rgba(255, 255, 255, ${Math.random() * 0.8 + 0.2})`
      });
    }

    const player = {
      x: canvas.width / 2,
      y: canvas.height - 120,
      width: 40,
      height: 40,
      speed: 8,
      color: '#0ff',
      cooldown: 0
    };

    const bullets = [];
    const enemies = [];
    const particles = [];

    // Controls bindings
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function bindTouchControl(element, keyString) {
      element.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyString] = true; });
      element.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyString] = false; });
    }
    bindTouchControl(document.getElementById('btnLeft'), 'ArrowLeft');
    bindTouchControl(document.getElementById('btnRight'), 'ArrowRight');
    bindTouchControl(document.getElementById('btnShoot'), 'Space');

    // State Management Functions
    function showMenu() {
      gameState = 'menu';
      elMainMenu.classList.remove('hidden');
      elGameOver.classList.add('hidden');
      elUI.classList.add('hidden');
      elMobileControls.classList.add('hidden');
      
      // Clear entities
      enemies.length = 0;
      bullets.length = 0;
      particles.length = 0;
    }

    function startGame() {
      gameState = 'playing';
      score = 0;
      document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
      
      // Reset player position
      player.x = canvas.width / 2 - player.width / 2;
      player.y = canvas.height - 120;
      
      // Clear entities
      enemies.length = 0;
      bullets.length = 0;
      particles.length = 0;
      keys['Space'] = false; // Prevent instant shot if spacebar was used to click start

      // Manage UI
      elMainMenu.classList.add('hidden');
      elGameOver.classList.add('hidden');
      elUI.classList.remove('hidden');
      elMobileControls.classList.remove('hidden');
    }

    function triggerGameOver() {
      gameState = 'gameover';
      elGameOver.classList.remove('hidden');
      elUI.classList.add('hidden');
      elMobileControls.classList.add('hidden');
    }

    // Classes
    class Bullet {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 4;
        this.height = 20;
        this.speed = 12;
        this.color = '#ff0';
      }
      draw() {
        ctx.fillStyle = '#fff'; 
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.shadowBlur = 0;
      }
      update() {
        this.y -= this.speed;
      }
    }

    class Enemy {
      constructor() {
        this.width = Math.random() * 25 + 25;
        this.height = this.width;
        this.x = Math.random() * (canvas.width - this.width);
        this.y = -this.height;
        this.speed = Math.random() * 2.5 + 1.5;
        this.color = '#f0f';
        this.rotation = 0;
        this.spinSpeed = (Math.random() - 0.5) * 0.05;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
        ctx.rotate(this.rotation);
        
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.moveTo(0, -this.height / 2); 
        ctx.lineTo(this.width / 2, 0);   
        ctx.lineTo(0, this.height / 2);  
        ctx.lineTo(-this.width / 2, 0);  
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(0, 0, this.width / 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      update() {
        this.y += this.speed;
        this.rotation += this.spinSpeed;
      }
    }

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 5 + 2;
        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 6 + 2;
        this.speedX = Math.cos(angle) * velocity;
        this.speedY = Math.sin(angle) * velocity;
        this.color = color;
        this.life = 1;
        this.decay = Math.random() * 0.03 + 0.02;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedX *= 0.95; 
        this.speedY *= 0.95; 
        this.life -= this.decay;
      }
    }

    function createExplosion(x, y, color) {
      for (let i = 0; i < 25; i++) {
        const pColor = Math.random() > 0.5 ? color : '#fff';
        particles.push(new Particle(x, y, pColor));
      }
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
      
      ctx.fillStyle = Math.random() > 0.5 ? '#f90' : '#f00';
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#f00';
      ctx.beginPath();
      ctx.moveTo(-10, 15);
      ctx.lineTo(10, 15);
      ctx.lineTo(0, 30 + Math.random() * 15); 
      ctx.fill();

      ctx.fillStyle = player.color;
      ctx.shadowBlur = 20;
      ctx.shadowColor = player.color;
      ctx.beginPath();
      ctx.moveTo(0, -25); 
      ctx.lineTo(20, 10); 
      ctx.lineTo(10, 20); 
      ctx.lineTo(-10, 20); 
      ctx.lineTo(-20, 10); 
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#050510';
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(0, -10);
      ctx.lineTo(5, 5);
      ctx.lineTo(-5, 5);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function animate() {
      // 1. Draw Background (Runs in all states)
      ctx.fillStyle = 'rgba(2, 2, 8, 0.4)'; 
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 2. Update & Draw Starfield (Runs in all states)
      stars.forEach(star => {
        star.y += star.speed;
        if (star.y > canvas.height) {
          star.y = 0;
          star.x = Math.random() * canvas.width;
        }
        ctx.fillStyle = star.color;
        ctx.fillRect(star.x, star.y, star.size, star.size);
      });

      // 3. Gameplay Logic (Only runs if actively playing)
      if (gameState === 'playing') {
        if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
        if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.width) player.x += player.speed;

        if (player.cooldown > 0) player.cooldown--;
        if (keys['Space'] && player.cooldown === 0) {
          bullets.push(new Bullet(player.x + 5, player.y)); 
          bullets.push(new Bullet(player.x + player.width - 9, player.y)); 
          player.cooldown = 12; 
        }

        drawPlayer();

        bullets.forEach((bullet, index) => {
          bullet.update();
          bullet.draw();
          if (bullet.y < 0) bullets.splice(index, 1);
        });

        if (Math.random() < 0.03 + (score * 0.0001)) {
          enemies.push(new Enemy());
        }

        enemies.forEach((enemy, eIndex) => {
          enemy.update();
          enemy.draw();

          const hitX = player.x + 10;
          const hitW = player.width - 20;
          if (hitX < enemy.x + enemy.width && hitX + hitW > enemy.x &&
              player.y < enemy.y + enemy.height && player.height + player.y > enemy.y) {
            createExplosion(player.x + player.width/2, player.y + player.height/2, player.color);
            triggerGameOver();
          }

          bullets.forEach((bullet, bIndex) => {
            if (bullet.x < enemy.x + enemy.width && bullet.x + bullet.width > enemy.x &&
                bullet.y < enemy.y + enemy.height && bullet.height + bullet.y > enemy.y) {
              
              createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color);
              enemies.splice(eIndex, 1);
              bullets.splice(bIndex, 1);
              score += 15;
              document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
            }
          });

          if (enemy.y > canvas.height) enemies.splice(eIndex, 1);
        });
      }

      // 4. Update Particles (Runs in all states so explosions finish animating after death)
      particles.forEach((particle, index) => {
        if (particle.life <= 0) {
          particles.splice(index, 1);
        } else {
          particle.update();
          particle.draw();
        }
      });

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if(gameState !== 'playing') player.y = canvas.height - 120; 
    });

    // Start loop
    animate();
  </script>
</body>
</html>
